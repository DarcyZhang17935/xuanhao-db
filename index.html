<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图文投放选号工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}
header{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:600;color:#1a1a1a}
header span{font-size:12px;color:#999}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e8e8;padding:0 24px}
.tab{padding:14px 20px;font-size:14px;color:#666;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:#1677ff;border-bottom-color:#1677ff;font-weight:500}
.panel{display:none;padding:20px 24px;max-width:900px;margin:0 auto}
.panel.active{display:block}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;padding:9px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none;transition:border .15s}
.search-bar input:focus{border-color:#1677ff}
.search-bar button{padding:9px 20px;background:#1677ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;white-space:nowrap}
.search-bar button:hover{background:#0958d9}
.suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:0}
.sug-tag{font-size:12px;padding:3px 10px;border-radius:20px;background:#f0f0f0;color:#555;cursor:pointer;border:1px solid #e0e0e0;transition:all .1s}
.sug-tag:hover{background:#e6f4ff;color:#1677ff;border-color:#91caff}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters select{padding:7px 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff;color:#1a1a1a}
.filters label{font-size:13px;color:#666}
.section-title{font-size:13px;color:#999;margin-bottom:10px;font-weight:500}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:16px;margin-bottom:12px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.account-name{font-size:15px;font-weight:600;color:#1a1a1a}
.badges{display:flex;gap:6px;align-items:center}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.b-green{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f}
.b-blue{background:#e6f4ff;color:#1677ff;border:1px solid #91caff}
.b-orange{background:#fff7e6;color:#d46b08;border:1px solid #ffd591}
.b-red{background:#fff2f0;color:#cf1322;border:1px solid #ffa39e}
.b-gray{background:#fafafa;color:#8c8c8c;border:1px solid #d9d9d9}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.metric{background:#fafafa;border-radius:6px;padding:10px;text-align:center}
.metric-val{font-size:18px;font-weight:600;color:#1a1a1a;line-height:1.2}
.metric-label{font-size:11px;color:#999;margin-top:3px}
.info-row{display:flex;gap:20px;padding:8px 0;border-top:1px solid #f0f0f0;flex-wrap:wrap}
.info-item{display:flex;align-items:center;gap:5px}
.info-key{font-size:12px;color:#999}
.info-val{font-size:12px;color:#333;font-weight:500}
.verdict{margin-top:10px;padding:9px 12px;border-radius:6px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.v-yes{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f}
.v-caution{background:#fff7e6;color:#d46b08;border:1px solid #ffd591}
.v-no{background:#fff2f0;color:#cf1322;border:1px solid #ffa39e}
.dir-warn{background:#fff2f0;border:1px solid #ffa39e;border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#cf1322}
.dir-ok{background:#f6ffed;border:1px solid #b7eb8f;border-radius:6px;padding:8px 14px;margin-bottom:12px;font-size:12px;color:#389e0d}
.empty{text-align:center;padding:40px;color:#bbb;font-size:14px}
.dir-table{width:100%;border-collapse:collapse;margin-bottom:16px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e8e8e8}
.dir-table th{background:#fafafa;padding:9px 12px;text-align:left;font-size:12px;color:#666;font-weight:500;border-bottom:1px solid #e8e8e8}
.dir-table td{padding:9px 12px;font-size:13px;border-bottom:1px solid #f5f5f5}
.dir-table tr:last-child td{border-bottom:none}
.roi-high{color:#389e0d;font-weight:600}
.roi-low{color:#cf1322;font-weight:600}
.roi-mid{color:#d46b08;font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-green{background:#52c41a}
.dot-red{background:#ff4d4f}
.count-tip{font-size:12px;color:#999;margin-bottom:8px}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}.info-row{gap:10px}.filters{gap:6px}}
</style>
</head>
<body>
<header>
  <h1>图文投放选号工具</h1>
  <span id="update-time">数据加载中...</span>
</header>
<div class="tabs">
  <div class="tab active" onclick="switchTab('query')">账号查询</div>
  <div class="tab" onclick="switchTab('recommend')">推荐账号</div>
  <div class="tab" onclick="switchTab('direction')">本月方向热度</div>
</div>

<div id="panel-query" class="panel active">
  <div class="search-bar">
    <input type="text" id="q-input" placeholder="输入账号名称关键词，如：法律、质量、审计..." oninput="onInput()" onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">查询</button>
  </div>
  <div id="q-suggestions" class="suggestions"></div>
  <div id="q-result"></div>
</div>

<div id="panel-recommend" class="panel">
  <div class="filters">
    <label>人群方向：</label>
    <select id="f-crowd" onchange="doRecommend()"><option value="">全部人群</option></select>
    <label>排序：</label>
    <select id="f-sort" onchange="doRecommend()">
      <option value="roi">按历史ROI</option>
      <option value="gmv">按总GMV</option>
      <option value="rate">按出单率</option>
      <option value="recent">按最近投放</option>
    </select>
    <label>复投间隔：</label>
    <select id="f-interval" onchange="doRecommend()">
      <option value="">不限</option>
      <option value="14">距今≥14天</option>
      <option value="30">距今≥30天</option>
      <option value="60">距今≥60天</option>
    </select>
  </div>
  <div id="r-result"></div>
</div>

<div id="panel-direction" class="panel">
  <p class="section-title">本月（2026年4月）各方向出单情况</p>
  <div id="d-result"></div>
</div>

<script src="db.js"></script>
<script>
const ACCOUNTS = DB.accounts;
const DIRECTIONS = DB.directions;
const TODAY = '2026-04-24';

document.getElementById('update-time').textContent = '共 ' + ACCOUNTS.length + ' 个账号 · 数据截至 ' + TODAY;

const crowds = [...new Set(ACCOUNTS.map(a=>a['主要人群']).filter(Boolean))].sort();
const sel = document.getElementById('f-crowd');
crowds.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['query','recommend','direction'][i]===t));
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='recommend') doRecommend();
  if(t==='direction') doDirection();
}

function roiClass(r){if(r>=2)return'roi-high';if(r>=1)return'roi-mid';return'roi-low';}

function getVerdict(a, dirROI) {
  const goodDir = dirROI === null || dirROI >= 1;
  const roi = a['ROI'] || 0;
  const rate = parseFloat(a['出单率']) || 0;
  const times = a['投放次数'] || 0;
  if(!goodDir) return {text:'方向本月跑不动，谨慎', cls:'v-caution'};
  if(roi>=2 && rate>=0.6 && times>=3) return {text:'强烈推荐复投', cls:'v-yes'};
  if(roi>=1 && rate>=0.4 && times>=2) return {text:'建议复投', cls:'v-yes'};
  if(roi>=1 && a['出单次数']>0) return {text:'可小额测试', cls:'v-caution'};
  if(a['出单次数']>0) return {text:'谨慎，ROI不足1', cls:'v-caution'};
  return {text:'不建议，从未出单', cls:'v-no'};
}

function getDirROI(crowd) {
  if(!crowd) return null;
  const d = DIRECTIONS.find(x=>x['人群']===crowd && x['总GMV']>0);
  return d ? d['ROI'] : null;
}

function intervalBadge(days) {
  if(days>=999) return '<span class="badge b-gray">未投放过</span>';
  if(days<=14) return '<span class="badge b-orange">'+days+'天前·建议间隔</span>';
  if(days<=30) return '<span class="badge b-blue">'+days+'天前</span>';
  return '<span class="badge b-green">'+days+'天前·可复投</span>';
}

function renderCard(a, dirROI) {
  const roi = a['ROI']||0;
  const rate = parseFloat(a['出单率']||0);
  const avgGMV = parseFloat(a['平均出单GMV']||0);
  const v = getVerdict(a, dirROI);
  const days = a['距今天数']||999;
  return `<div class="card">
    <div class="card-top">
      <span class="account-name">${a['账号']}</span>
      <div class="badges">
        ${intervalBadge(days)}
        <span class="badge ${roi>=2?'b-green':roi>=1?'b-blue':'b-red'}">ROI ${roi.toFixed(2)}</span>
      </div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-val">${(rate*100).toFixed(0)}%</div><div class="metric-label">出单率</div></div>
      <div class="metric"><div class="metric-val">${a['投放次数']}</div><div class="metric-label">投放次数</div></div>
      <div class="metric"><div class="metric-val">¥${avgGMV?Math.round(avgGMV).toLocaleString():'-'}</div><div class="metric-label">平均出单GMV</div></div>
      <div class="metric"><div class="metric-val">¥${a['总GMV']?Math.round(a['总GMV']).toLocaleString():'-'}</div><div class="metric-label">历史总GMV</div></div>
    </div>
    <div class="info-row">
      <div class="info-item"><span class="info-key">人群</span><span class="info-val">${a['主要人群']||'-'}</span></div>
      <div class="info-item"><span class="info-key">细分</span><span class="info-val">${a['主要细分']||'-'}</span></div>
      <div class="info-item"><span class="info-key">最近投放</span><span class="info-val">${a['最近投放日期']||'无记录'}</span></div>
      <div class="info-item"><span class="info-key">最近3次GMV</span><span class="info-val">${a['最近3次GMV']||'-'}</span></div>
    </div>
    <div class="verdict ${v.cls}">${v.text}</div>
  </div>`;
}

function onInput() {
  const val = document.getElementById('q-input').value.trim();
  const box = document.getElementById('q-suggestions');
  if(!val){box.innerHTML='';return;}
  const hits = ACCOUNTS.filter(a=>a['账号'].includes(val)).slice(0,8);
  box.innerHTML = hits.map(a=>`<span class="sug-tag" onclick="selectAccount('${a['账号'].replace(/'/g,"\\'")}'">${a['账号']}</span>`).join('');
}

function selectAccount(name) {
  document.getElementById('q-input').value = name;
  document.getElementById('q-suggestions').innerHTML = '';
  doSearch();
}

function doSearch() {
  const val = document.getElementById('q-input').value.trim();
  const el = document.getElementById('q-result');
  if(!val){el.innerHTML='<p class="empty">请输入账号名称</p>';return;}
  const hits = ACCOUNTS.filter(a=>a['账号'].includes(val));
  if(!hits.length){el.innerHTML='<p class="empty">未找到账号，请检查名称是否正确</p>';return;}
  el.innerHTML = `<p class="count-tip">找到 ${hits.length} 个相关账号</p>` + hits.slice(0,10).map(a=>{
    const crowd = a['主要人群'];
    const dirInfo = DIRECTIONS.find(d=>d['人群']===crowd);
    const dirROI = dirInfo ? dirInfo['ROI'] : null;
    let dirTip = '';
    if(dirInfo && dirInfo['总GMV']>0) dirTip = `<div class="dir-ok">本月 ${crowd} 方向：消耗¥${Math.round(dirInfo['总消耗']).toLocaleString()} / GMV¥${Math.round(dirInfo['总GMV']).toLocaleString()} / ROI ${dirInfo['ROI'].toFixed(2)}</div>`;
    else if(dirInfo) dirTip = `<div class="dir-warn">本月 ${crowd} 方向消耗¥${Math.round(dirInfo['总消耗']).toLocaleString()} 但GMV为0，方向跑不动</div>`;
    return dirTip + renderCard(a, dirROI);
  }).join('');
}

function doRecommend() {
  const crowd = document.getElementById('f-crowd').value;
  const sort = document.getElementById('f-sort').value;
  const interval = parseInt(document.getElementById('f-interval').value)||0;
  const el = document.getElementById('r-result');

  if(crowd) {
    const dirInfo = DIRECTIONS.find(d=>d['人群']===crowd);
    if(dirInfo && dirInfo['ROI']<1 && dirInfo['总消耗']>0) {
      el.innerHTML = `<div class="dir-warn">⚠️ ${crowd} 方向本月ROI为 ${dirInfo['ROI'].toFixed(2)}，跑不动，不建议投该方向账号</div>`;
      return;
    }
    if(dirInfo && dirInfo['总GMV']>0) {
      el.innerHTML = `<div class="dir-ok">✓ ${crowd} 本月ROI ${dirInfo['ROI'].toFixed(2)}，方向热度良好</div>`;
    } else {
      el.innerHTML = '';
    }
  } else {
    el.innerHTML = '';
  }

  let list = ACCOUNTS.filter(a=>{
    if(a['出单次数']<=0) return false;
    const roi = a['ROI']||0;
    if(roi<1) return false;
    if(a['投放次数']<2) return false;
    if(crowd && a['主要人群']!==crowd) return false;
    if(interval && (a['距今天数']||0)<interval) return false;
    return true;
  });

  if(sort==='roi') list.sort((a,b)=>(b['ROI']||0)-(a['ROI']||0));
  else if(sort==='gmv') list.sort((a,b)=>(b['总GMV']||0)-(a['总GMV']||0));
  else if(sort==='rate') list.sort((a,b)=>(parseFloat(b['出单率'])||0)-(parseFloat(a['出单率'])||0));
  else if(sort==='recent') list.sort((a,b)=>(a['距今天数']||999)-(b['距今天数']||999));

  if(!list.length){el.innerHTML+='<p class="empty">没有符合条件的账号</p>';return;}
  const dirROI = crowd ? getDirROI(crowd) : null;
  el.innerHTML += `<p class="count-tip">共 ${list.length} 个符合条件的账号，显示前30个</p>` + list.slice(0,30).map(a=>renderCard(a, dirROI)).join('');
}

function doDirection() {
  const el = document.getElementById('d-result');
  const active = DIRECTIONS.filter(d=>d['总GMV']>0).sort((a,b)=>b['ROI']-a['ROI']);
  const inactive = DIRECTIONS.filter(d=>d['总消耗']>0 && d['总GMV']===0);
  let html = `<table class="dir-table"><thead><tr><th>人群</th><th>细分</th><th>投放次数</th><th>总消耗</th><th>总GMV</th><th>ROI</th></tr></thead><tbody>`;
  active.forEach(d=>{
    html+=`<tr><td>${d['人群']}</td><td>${d['细分']}</td><td>${d['投放次数']}</td><td>¥${Math.round(d['总消耗']).toLocaleString()}</td><td>¥${Math.round(d['总GMV']).toLocaleString()}</td><td class="${roiClass(d['ROI'])}">${d['ROI'].toFixed(2)}</td></tr>`;
  });
  html += '</tbody></table>';
  if(inactive.length) {
    html += `<p class="section-title" style="margin-top:16px">本月有消耗但未出单的方向</p><table class="dir-table"><thead><tr><th>人群</th><th>细分</th><th>消耗</th><th>GMV</th></tr></thead><tbody>`;
    inactive.forEach(d=>{html+=`<tr><td>${d['人群']}</td><td>${d['细分']}</td><td>¥${Math.round(d['总消耗']).toLocaleString()}</td><td class="roi-low">0</td></tr>`;});
    html += '</tbody></table>';
  }
  el.innerHTML = html;
}
</script>
</body>
</html>
